# gd ferry — Cloud Build config for scraper API
#
# Triggered from repo root. Builds the Docker image and deploys to Cloud Run.
#
# Usage:
#   gcloud builds submit --config packages/cloud/scraper-api/cloudbuild.yaml .

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api:latest"
      - "-f"
      - "packages/cloud/scraper-api/Dockerfile"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "ferry-scraper"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "900"
      - "--concurrency"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
      - "--allow-unauthenticated"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api:$SHORT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/ferry/scraper-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
