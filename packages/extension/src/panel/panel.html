<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 12px; background: #fafafa; }

      /* ── Top bar ── */
      .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
      button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
      button:hover { background: #f0f0f0; }
      button:disabled { opacity: 0.4; cursor: default; }
      .pill { padding: 2px 10px; border: 1px solid #ccc; border-radius: 999px; font-size: 12px; background: #fff; }
      .pill.recording { background: #fee; border-color: #e55; color: #c33; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

      /* ── Score card ── */
      .scorecard { display: flex; gap: 12px; margin-bottom: 12px; }
      .score-box { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; text-align: center; }
      .score-box .number { font-size: 28px; font-weight: 700; line-height: 1.2; }
      .score-box .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
      .score-box.errors .number { color: #d32f2f; }
      .score-box.warnings .number { color: #f57c00; }
      .score-box.info .number { color: #1976d2; }
      .score-box.events .number { color: #333; }

      /* ── Tabs ── */
      .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 12px; }
      .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #666; }
      .tab:hover { color: #333; }
      .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }

      /* ── Content panels ── */
      .tab-content { display: none; }
      .tab-content.active { display: block; }

      /* ── Findings list ── */
      .finding { padding: 10px 12px; margin-bottom: 6px; border-radius: 6px; border-left: 4px solid; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
      .finding.error { border-left-color: #d32f2f; }
      .finding.warning { border-left-color: #f57c00; }
      .finding.info { border-left-color: #1976d2; }
      .finding .severity-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-right: 6px; }
      .finding.error .severity-badge { background: #ffebee; color: #d32f2f; }
      .finding.warning .severity-badge { background: #fff3e0; color: #f57c00; }
      .finding.info .severity-badge { background: #e3f2fd; color: #1976d2; }
      .finding .category-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; background: #f5f5f5; color: #666; margin-right: 6px; }
      .finding .message { font-weight: 600; font-size: 13px; margin: 4px 0; }
      .finding .detail { font-size: 12px; color: #555; line-height: 1.4; }
      .finding .docs-link { font-size: 11px; color: #1a73e8; text-decoration: none; margin-top: 4px; display: inline-block; }
      .finding .event-ref { font-size: 11px; color: #999; }

      /* ── Event list ── */
      .event-row { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; background: #fff; border: 1px solid #eee; font-size: 12px; cursor: pointer; }
      .event-row:hover { background: #f8f9fa; }
      .event-row .event-name { font-weight: 600; font-size: 13px; }
      .event-row .event-source { color: #999; font-size: 11px; }
      .event-row .event-badges { margin-top: 4px; }
      .event-row .mini-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
      .event-row .mini-badge.err { background: #ffebee; color: #d32f2f; }
      .event-row .mini-badge.warn { background: #fff3e0; color: #f57c00; }
      .event-detail { display: none; padding: 8px; background: #f5f5f5; border-radius: 4px; margin-top: 6px; }
      .event-detail.open { display: block; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 11px; }

      .empty-state { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="startBtn">● Record</button>
      <button id="stopBtn" disabled>■ Stop</button>
      <button id="exportBtn">Export JSON</button>
      <button id="clearBtn">Clear</button>
      <span class="pill" id="statusPill">Stopped</span>
    </div>

    <div class="scorecard" id="scorecard" style="display:none;">
      <div class="score-box events">
        <div class="number" id="scoreEvents">0</div>
        <div class="label">Events</div>
      </div>
      <div class="score-box errors">
        <div class="number" id="scoreErrors">0</div>
        <div class="label">Errors</div>
      </div>
      <div class="score-box warnings">
        <div class="number" id="scoreWarnings">0</div>
        <div class="label">Warnings</div>
      </div>
      <div class="score-box info">
        <div class="number" id="scoreInfo">0</div>
        <div class="label">Info</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="findings">Findings</div>
      <div class="tab" data-tab="events">Events</div>
      <div class="tab" data-tab="network">Network</div>
    </div>

    <div class="tab-content active" id="tab-findings">
      <div class="empty-state" id="findingsEmpty">
        Start recording to analyze data layer events.
      </div>
      <div id="findingsList"></div>
    </div>

    <div class="tab-content" id="tab-events">
      <div class="empty-state" id="eventsEmpty">No events captured yet.</div>
      <div id="eventsList"></div>
    </div>

    <div class="tab-content" id="tab-network">
      <div class="empty-state" id="networkEmpty">No network hits captured yet.</div>
      <div id="networkList"></div>
    </div>

    <script src="../rules/index.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
