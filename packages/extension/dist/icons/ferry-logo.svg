<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.7"/>
    </linearGradient>

    <linearGradient id="magicDust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Magic dust waves at bottom -->
  <path d="M 0 380 Q 64 360 128 380 T 256 380 T 384 380 T 512 380 L 512 512 L 0 512 Z" fill="url(#magicDust)"/>
  <path d="M 0 420 Q 85 400 170 420 T 340 420 T 512 420 L 512 512 L 0 512 Z" fill="url(#magicDust)" opacity="0.6"/>

  <!-- Fairy wings - back pair (larger) -->
  <ellipse cx="200" cy="180" rx="35" ry="55" fill="url(#wing)" opacity="0.85" transform="rotate(-35 200 180)"/>
  <ellipse cx="312" cy="180" rx="35" ry="55" fill="url(#wing)" opacity="0.85" transform="rotate(35 312 180)"/>

  <!-- Fairy wings - front pair (smaller) -->
  <ellipse cx="210" cy="210" rx="25" ry="40" fill="url(#wing)" opacity="0.75" transform="rotate(-25 210 210)"/>
  <ellipse cx="302" cy="210" rx="25" ry="40" fill="url(#wing)" opacity="0.75" transform="rotate(25 302 210)"/>

  <!-- Fairy body -->
  <ellipse cx="256" cy="270" rx="30" ry="50" fill="white"/>

  <!-- Fairy arms -->
  <line x1="226" y1="250" x2="200" y2="240" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="286" y1="250" x2="312" y2="240" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Fairy head -->
  <circle cx="256" cy="150" r="28" fill="white"/>

  <!-- Fairy face - simple dots for eyes -->
  <circle cx="248" cy="145" r="3" fill="#6366f1"/>
  <circle cx="264" cy="145" r="3" fill="#6366f1"/>

  <!-- Fairy mouth - small smile -->
  <path d="M 248 160 Q 256 165 264 160" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Golden wand - held up from right hand -->
  <line x1="312" y1="240" x2="340" y2="120" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Wand star sparkle at tip -->
  <g filter="url(#sparkleGlow)">
    <polygon points="340,100 345,115 360,120 345,125 340,140 335,125 320,120 335,115" fill="#fbbf24"/>
  </g>

  <!-- Scattered sparkle dots and stars around fairy -->
  <!-- Top left sparkles -->
  <circle cx="140" cy="120" r="3" fill="white" opacity="0.9"/>
  <circle cx="160" cy="100" r="2" fill="white" opacity="0.7"/>
  <polygon points="130,160 133,168 142,170 133,172 130,180 127,172 118,170 127,168" fill="white" opacity="0.8"/>

  <!-- Top right sparkles -->
  <circle cx="380" cy="110" r="3" fill="white" opacity="0.85"/>
  <circle cx="400" cy="135" r="2" fill="white" opacity="0.6"/>
  <polygon points="390,90 393,98 402,100 393,102 390,110 387,102 378,100 387,98" fill="white" opacity="0.75"/>

  <!-- Left side sparkles -->
  <circle cx="120" cy="260" r="2.5" fill="white" opacity="0.8"/>
  <polygon points="110,310 113,318 122,320 113,322 110,330 107,322 98,320 107,318" fill="white" opacity="0.7"/>

  <!-- Right side sparkles -->
  <circle cx="400" cy="270" r="2.5" fill="white" opacity="0.8"/>
  <polygon points="410,240 413,248 422,250 413,252 410,260 407,252 398,250 407,248" fill="white" opacity="0.7"/>

  <!-- Bottom sparkles -->
  <circle cx="200" cy="380" r="2" fill="white" opacity="0.7"/>
  <circle cx="340" cy="390" r="2" fill="white" opacity="0.6"/>
  <polygon points="280,420 283,428 292,430 283,432 280,440 277,432 268,430 277,428" fill="white" opacity="0.65"/>

  <!-- Additional small sparkles for magic effect -->
  <circle cx="220" cy="120" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="300" cy="130" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="280" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="370" cy="310" r="1.5" fill="white" opacity="0.5"/>
</svg>
